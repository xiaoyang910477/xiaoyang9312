<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>小阳的个人主页</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            color: white;
            text-align: center;
            padding: 20px;
        }
        .container {
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
            border-radius: 20px;
            padding: 40px;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.2);
            max-width: 600px;
            width: 100%;
        }
        h1 {
            font-size: 3rem;
            margin-bottom: 20px;
            text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.3);
        }
        p {
            font-size: 1.2rem;
            margin-bottom: 30px;
            opacity: 0.9;
        }
        .domain {
            font-size: 1.1rem;
            background: rgba(255, 255, 255, 0.2);
            padding: 10px 20px;
            border-radius: 30px;
            display: inline-block;
            margin-bottom: 30px;
        }
        .links {
            display: flex;
            gap: 20px;
            justify-content: center;
            flex-wrap: wrap;
        }
        .links button {
            padding: 12px 24px;
            background: white;
            color: #667eea;
            border: none;
            border-radius: 30px;
            font-weight: bold;
            font-size: 1rem;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        .links button:hover {
            transform: translateY(-3px);
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.2);
        }
        /* 弹窗样式 */
        .popup {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.5);
            align-items: center;
            justify-content: center;
        }
        .popup-content {
            background: white;
            color: #333;
            padding: 30px;
            border-radius: 15px;
            text-align: center;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.3);
        }
        .popup-content h3 {
            margin-bottom: 15px;
            color: #667eea;
        }
        .popup-content .qq-number {
            font-size: 1.5rem;
            font-weight: bold;
            margin-bottom: 20px;
        }
        .popup-content .copy-btn {
            padding: 8px 16px;
            background: #667eea;
            color: white;
            border: none;
            border-radius: 20px;
            cursor: pointer;
            margin-right: 10px;
        }
        .popup-content .close-btn {
            padding: 8px 16px;
            background: #ccc;
            color: #333;
            border: none;
            border-radius: 20px;
            cursor: pointer;
        }
        .copy-success {
            color: #28a745;
            margin-top: 10px;
            font-size: 0.9rem;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>👋 你好，我是小阳</h1>
        <p>这是我的个人主页，由 Cloudflare Pages 强力驱动</p>
        <div class="domain">
            🌐 我的域名：yangxiaoyang.fun
        </div>
        <div class="links">
            <button onclick="showQQ()">联系我</button>
        </div>
    </div>

    <!-- QQ弹窗 -->
    <div class="popup" id="qqPopup">
        <div class="popup-content">
            <h3>我的QQ</h3>
            <div class="qq-number">2248653591</div>
            <button class="copy-btn" onclick="copyQQ()">复制QQ号</button>
            <button class="close-btn" onclick="hideQQ()">关闭</button>
            <div class="copy-success" id="copySuccess" style="display: none;">✅ 复制成功！</div>
        </div>
    </div>

    <script>
        function showQQ() {
            document.getElementById('qqPopup').style.display = 'flex';
            document.getElementById('copySuccess').style.display = 'none';
        }
        function hideQQ() {
            document.getElementById('qqPopup').style.display = 'none';
        }
        function copyQQ() {
            const qq = "2248653591";
            navigator.clipboard.writeText(qq).then(() => {
                document.getElementById('copySuccess').style.display = 'block';
            }).catch(err => {
                alert("复制失败，请手动复制：" + qq);
            });
        }
    </script>
</body>
</html>
