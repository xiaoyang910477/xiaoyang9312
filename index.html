<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>小阳宝宝的个人主页</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: url("bg.jpg") center center / cover no-repeat fixed;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: space-between;
            color: white;
            text-align: center;
            padding: 40px 20px;
        }
        .header {
            text-align: center;
            text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.5);
        }
        h1 {
            font-size: 3rem;
            margin-bottom: 15px;
        }
        .sub-title {
            font-size: 1.3rem;
            margin-bottom: 15px;
            opacity: 0.95;
        }
        .domain {
            font-size: 1.2rem;
            background: rgba(255, 255, 255, 0.25);
            padding: 10px 25px;
            border-radius: 30px;
            display: inline-block;
            backdrop-filter: blur(5px);
        }
        .links {
            display: flex;
            gap: 15px;
            justify-content: center;
            flex-wrap: wrap;
            max-width: 900px;
        }
        .links button,
        .links a {
            padding: 12px 22px;
            background: rgba(255, 255, 255, 0.9);
            color: #667eea;
            border: none;
            border-radius: 30px;
            font-weight: bold;
            font-size: 1rem;
            cursor: pointer;
            text-decoration: none;
            transition: all 0.3s ease;
            box-shadow: 0 3px 10px rgba(0, 0, 0, 0.15);
        }
        .links button:hover,
        .links a:hover {
            transform: translateY(-3px);
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.25);
            background: white;
        }
        /* QQ弹窗样式 */
        .popup {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.5);
            align-items: center;
            justify-content: center;
        }
        .popup-content {
            background: white;
            color: #333;
            padding: 30px;
            border-radius: 15px;
            text-align: center;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.3);
        }
        .popup-content h3 {
            margin-bottom: 15px;
            color: #667eea;
        }
        .popup-content .qq-number {
            font-size: 1.5rem;
            font-weight: bold;
            margin-bottom: 20px;
        }
        .popup-content .copy-btn {
            padding: 8px 16px;
            background: #667eea;
            color: white;
            border: none;
            border-radius: 20px;
            cursor: pointer;
            margin-right: 10px;
        }
        .popup-content .close-btn {
            padding: 8px 16px;
            background: #ccc;
            color: #333;
            border: none;
            border-radius: 20px;
            cursor: pointer;
        }
        .copy-success {
            color: #28a745;
            margin-top: 10px;
            font-size: 0.9rem;
        }
    </style>
</head>
<body>
    <div class="header">
        <h1>👋 你好，我是小阳宝宝</h1>
        <div class="sub-title">这是我的网址里面有一些网址点击自动跳转</div>
        <div class="domain">
            🌐 小阳宝宝的家：yangxiaoyang.fun
        </div>
    </div>

    <div class="links">
        <a href="https://www.lanzoui.com/" target="_blank">☁️ 蓝奏云</a>
        <a href="https://lsdy.lanzoui.com/b0bwa7gif" target="_blank">🤖 搞机助手</a>
        <a href="https://wwauy.lanzouv.com/ie36U3rt2yvc" target="_blank">🌸 紫罗兰</a>
        <a href="https://geekuninstaller.com/download" target="_blank">🧹 Geek</a>
        <a href="https://xiaomirom.com/" target="_blank">📦 小米包</a>
        <a href="https://www.miui.com/unlock/download.html" target="_blank">🔓 小米BL官网</a>
        <a href="https://user.123pan.cn/centerlogin" target="_blank">💾 123云盘</a>
        <a href="https://www.doubao.com/chat/" target="_blank">🤖 豆包</a>
        <button onclick="showQQ()">📞 联系我</button>
    </div>

    <!-- QQ弹窗 -->
    <div class="popup" id="qqPopup">
        <div class="popup-content">
            <h3>我的QQ</h3>
            <div class="qq-number">2248653591</div>
            <button class="copy-btn" onclick="copyQQ()">复制QQ号</button>
            <button class="close-btn" onclick="hideQQ()">关闭</button>
            <div class="copy-success" id="copySuccess" style="display: none;">✅ 复制成功！</div>
        </div>
    </div>

    <script>
        function showQQ() {
            document.getElementById('qqPopup').style.display = 'flex';
            document.getElementById('copySuccess').style.display = 'none';
        }
        function hideQQ() {
            document.getElementById('qqPopup').style.display = 'none';
        }
        function copyQQ() {
            const qq = "2248653591";
            navigator.clipboard.writeText(qq).then(() => {
                document.getElementById('copySuccess').style.display = 'block';
            }).catch(err => {
                alert("复制失败，请手动复制：" + qq);
            });
        }
    </script>
</body>
</html>
